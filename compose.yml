services:
  transit-hub:
    image: transit-hub-server
    container_name: transit-hub-server
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ADDR: ":8080"
      DB_PATH: /app/data/transit-hub.db
      CONFIG_DIR: /app/configs
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs:ro
    networks:
      - transit-hub-net
    restart: unless-stopped

networks:
  transit-hub-net:
    external: true
