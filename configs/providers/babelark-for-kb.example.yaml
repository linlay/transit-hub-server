name: babelark-for-kb
protocol: openai
base_url: https://api.babelark.com
default_pool: primary
headers: {}
endpoints:
  openai_embeddings: /v1/embeddings
models:
  - public: babelark-text-embedding-v4
    upstream: text-embedding-v4
    type: embedding
    pool: primary
    owned_by: babelark-for-kb
    display_name: BabelArk Text Embedding v4
pools:
  - name: primary
    accounts:
      - name: babelark-kb-main
        api_key: sk-your-upstream-key
        weight: 1
