name: deepseek
protocol: openai
base_url: https://api.deepseek.com
default_pool: primary
headers: {}
# endpoints:
#   openai_chat_completions: /v1/chat/completions
models:
  - public: example-chat
    upstream: example-upstream-chat
    pool: primary
pools:
  - name: primary
    accounts:
      - name: deepseek-main
        api_key: sk-your-upstream-key
        weight: 1
